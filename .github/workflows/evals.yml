name: evals

on:
  workflow_dispatch:
  pull_request:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore and build
        run: |
          dotnet restore gh-maf-template.sln
          dotnet build gh-maf-template.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test gh-maf-template.sln --configuration Release --no-build
