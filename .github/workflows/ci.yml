name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore gh-maf-template.sln

      - name: Build
        run: dotnet build gh-maf-template.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test gh-maf-template.sln --configuration Release --no-build

  build-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: src/Veritas.Web

      - name: Build UI
        run: npm run build
        working-directory: src/Veritas.Web
