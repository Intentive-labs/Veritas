name: veritas-validation

on:
  workflow_dispatch:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Validate restore/build/test
        run: |
          dotnet restore gh-maf-template.sln
          dotnet build gh-maf-template.sln --configuration Release --no-restore
          dotnet test gh-maf-template.sln --configuration Release --no-build

      - name: Validate required docs exist
        run: |
          test -f README.md
          test -f USAGE.md
          test -f HOSTING.md
          test -f REVIEW.md
          test -f PROJECT_STRUCTURE.md
          test -f DECISIONS.md
          test -f LEARNINGS.md

          test -f .github/copilot-instructions.md
          test -f .github/pull_request_template.md
          test -f .github/instructions/csharp.instructions.md
          test -f .github/instructions/tests.instructions.md
          test -f .github/instructions/docs.instructions.md
          test -f .github/instructions/security.instructions.md

          test -f .github/skills/development-agent-workflow/SKILL.md
          test -f .github/skills/agent-framework-change-workflow/SKILL.md
          test -f .github/skills/evaluation-workflow/SKILL.md
          test -f .github/skills/safe-runtime-modification/SKILL.md

          test -f docs/architecture/system-overview.md
          test -f docs/architecture/decision-log.md

          test -f .github/workflows/ci.yml
          test -f .github/workflows/evals.yml
          test -f .github/workflows/pr-checks.yml

      - name: Validate only .md files under .github/agents
        run: |
          if find .github/agents -type f ! -name "*.md" 2>/dev/null | grep . >/dev/null; then
            echo "Non-markdown files detected under .github/agents/. Only .md instruction files are permitted."
            exit 1
          fi
